<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System moniter Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard">
        <header class="dashboard-header">
            <div class="header-left">
                <h1 class="dashboard-title">System Moniering</h1>
                <div class="status-indicators">
                    <div class="status-indicator active">
                        <span class="status-dot"></span>
                        <span class="status-text">Live</span>
                    </div>
                    <div class="status-indicator">
                        <span class="status-dot"></span>
                        <span class="status-text">Last updated: <span id="last-updated">Just now</span></span>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="time-display">
                    <span id="current-time">--:--:--</span>
                </div>
            </div>
        </header>

        <main class="dashboard-grid">
            <!-- CPU Usage Panel -->
            <div class="dashboard-panel">
                <div class="panel-header">
                    <h2 class="panel-title">CPU Usage</h2>
                    <div class="panel-actions">
                        <span class="current-value" id="cpu-current">0%</span>
                    </div>
                </div>
                <div class="panel-content">
                    <canvas id="cpu-chart" width="400" height="120"></canvas>
                </div>
            </div>

            <!-- RAM Usage Panel -->
            <div class="dashboard-panel">
                <div class="panel-header">
                    <h2 class="panel-title">Memory Usage</h2>
                    <div class="panel-actions">
                        <span class="current-value" id="ram-current">0%</span>
                    </div>
                </div>
                <div class="panel-content">
                    <canvas id="ram-chart" width="400" height="120"></canvas>
                </div>
            </div>

            <!-- Network Throughput Panel -->
            <div class="dashboard-panel">
                <div class="panel-header">
                    <h2 class="panel-title">Network Throughput</h2>
                    <div class="panel-actions">
                        <span class="current-value" id="network-current">0/0 Mbps</span>
                    </div>
                </div>
                <div class="panel-content">
                    <canvas id="network-chart" width="400" height="120"></canvas>
                </div>
            </div>

            <!-- Temperature Panel -->
            <div class="dashboard-panel">
                <div class="panel-header">
                    <h2 class="panel-title">Temperature</h2>
                    <div class="panel-actions">
                        <span class="current-value" id="temp-current">0°C</span>
                    </div>
                </div>
                <div class="panel-content">
                    <div class="temp-bars">
                        <div class="temp-bar-container">
                            <div class="temp-label">CPU</div>
                            <div class="temp-bar">
                                <div class="temp-fill" id="cpu-temp-bar"></div>
                            </div>
                            <div class="temp-value" id="cpu-temp-value">0°C</div>
                        </div>
                        <div class="temp-bar-container">
                            <div class="temp-label">GPU</div>
                            <div class="temp-bar">
                                <div class="temp-fill" id="gpu-temp-bar"></div>
                            </div>
                            <div class="temp-value" id="gpu-temp-value">0°C</div>
                        </div>
                        <div class="temp-bar-container">
                            <div class="temp-label">SSD</div>
                            <div class="temp-bar">
                                <div class="temp-fill" id="ssd-temp-bar"></div>
                            </div>
                            <div class="temp-value" id="ssd-temp-value">0°C</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- GPU Load Panel -->
            <div class="dashboard-panel">
                <div class="panel-header">
                    <h2 class="panel-title">GPU Load</h2>
                    <div class="panel-actions">
                        <span class="current-value" id="gpu-current">0%</span>
                    </div>
                </div>
                <div class="panel-content">
                    <div class="gpu-meter-container">
                        <canvas id="gpu-meter" width="200" height="200"></canvas>
                        <div class="gpu-meter-center">
                            <span class="gpu-percentage" id="gpu-percentage">0%</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Disk I/O Panel -->
            <div class="dashboard-panel">
                <div class="panel-header">
                    <h2 class="panel-title">Disk I/O</h2>
                    <div class="panel-actions">
                        <span class="current-value" id="disk-current">0/0 MB/s</span>
                    </div>
                </div>
                <div class="panel-content">
                    <div class="disk-sparklines">
                        <div class="sparkline-container">
                            <div class="sparkline-label">Read</div>
                            <canvas class="sparkline" id="disk-read-sparkline" width="180" height="40"></canvas>
                        </div>
                        <div class="sparkline-container">
                            <div class="sparkline-label">Write</div>
                            <canvas class="sparkline" id="disk-write-sparkline" width="180" height="40"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Process Table Panel -->
            <div class="dashboard-panel process-panel">
                <div class="panel-header">
                    <h2 class="panel-title">Active Processes</h2>
                    <div class="panel-actions">
                        <span class="current-value" id="process-count">0</span>
                    </div>
                </div>
                <div class="panel-content">
                    <table class="process-table">
                        <thead>
                            <tr>
                                <th>PID</th>
                                <th>Name</th>
                                <th>CPU</th>
                                <th>Memory</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="process-table-body">
                            <!-- Process rows will be inserted here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Binary Frame Visualizer -->
            <div class="dashboard-panel">
                <div class="panel-header">
                    <h2 class="panel-title">Binary Frame</h2>
                    <div class="panel-actions">
                        <span class="current-value" id="binary-rate">0 fps</span>
                    </div>
                </div>
                <div class="panel-content">
                    <div class="binary-grid" id="binary-grid">
                        <!-- Binary cells will be inserted here -->
                    </div>
                </div>
            </div>

            <!-- Event Timeline Panel -->
            <div class="dashboard-panel event-panel">
                <div class="panel-header">
                    <h2 class="panel-title">Event Timeline</h2>
                    <div class="panel-actions">
                        <span class="current-value" id="event-count">0</span>
                    </div>
                </div>
                <div class="panel-content">
                    <div class="event-timeline" id="event-timeline">
                        <!-- Event items will be inserted here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
